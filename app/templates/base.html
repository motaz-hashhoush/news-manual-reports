<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام التقارير{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a237e 0%, #1565c0 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0d1b6e 0%, #0d47a1 100%);
        }
        .table th {
            background-color: #1a237e;
            color: white;
            font-weight: 600;
        }
        .badge-admin { background-color: #c62828; }
        .badge-user { background-color: #2e7d32; }
        .hero-section {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if user %}
    <nav class="navbar navbar-expand-lg navbar-dark mb-0">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-file-earmark-bar-graph-fill me-2"></i>
                نظام التقارير
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50">
                    <i class="bi bi-person-circle me-1"></i>
                    {{ user.username }}
                    <span class="badge {% if user.role == 'admin' %}badge-admin{% else %}badge-user{% endif %} ms-1">
                        {{ user.role }}
                    </span>
                </span>
                <a href="/user/archive" class="btn btn-light btn-sm">
                    <i class="bi bi-archive me-1"></i>الأرشيف
                </a>
                <a href="/user/custom-report" class="btn btn-light btn-sm">
                    <i class="bi bi-file-earmark-pdf me-1"></i>تقرير مخصص
                </a>
                {% if user.role == 'admin' %}
                <a href="/admin/users" class="btn btn-light btn-sm">
                    <i class="bi bi-people-fill me-1"></i>المستخدمون
                </a>
                <a href="/admin/create-session" class="btn btn-light btn-sm">
                    <i class="bi bi-plus-circle me-1"></i>جلسة جديدة
                </a>
                {% endif %}
                <a href="/logout" class="btn btn-danger btn-sm">
                    <i class="bi bi-box-arrow-left me-1"></i>خروج
                </a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
