{% extends "base.html" %}

{% block title %}تقرير مخصص — نظام التقارير{% endblock %}

{% block extra_css %}
<style>
    .custom-report-header {
        background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
        color: white;
        padding: 2rem;
        border-radius: 12px;
        margin-bottom: 2rem;
    }
    
    .custom-report-header h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .form-card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .form-card-header {
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        padding: 1.5rem;
        border-bottom: 1px solid #dee2e6;
        border-radius: 12px 12px 0 0;
    }
    
    .form-card-header h3 {
        margin: 0;
        color: #1a237e;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .form-card-body {
        padding: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group:last-child {
        margin-bottom: 0;
    }
    
    .form-label {
        font-weight: 600;
        color: #1a237e;
        margin-bottom: 0.5rem;
    }
    
    .form-control {
        border: 1px solid #dee2e6;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        border-color: #1565c0;
        box-shadow: 0 0 0 0.2rem rgba(21, 101, 192, 0.25);
    }
    
    .date-time-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }
    
    @media (max-width: 768px) {
        .date-time-group {
            grid-template-columns: 1fr;
        }
    }
    
    .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #e9ecef;
    }
    
    .btn-generate {
        background: linear-gradient(135deg, #1a237e 0%, #1565c0 100%);
        border: none;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        cursor: pointer;
        font-size: 1rem;
    }
    
    .btn-generate:hover {
        background: linear-gradient(135deg, #0d1b6e 0%, #0d47a1 100%);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(26, 35, 126, 0.3);
        color: white;
        text-decoration: none;
    }
    
    .btn-reset {
        background: #6c757d;
        border: none;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        cursor: pointer;
        font-size: 1rem;
    }
    
    .btn-reset:hover {
        background: #5a6268;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
        color: white;
        text-decoration: none;
    }
    
    .alert {
        border-radius: 6px;
        border: none;
        margin-bottom: 1.5rem;
    }
    
    .alert-danger {
        background: #f8d7da;
        color: #721c24;
    }
</style>
{% endblock %}

{% block content %}
<div class="custom-report-header">
    <h1>
        <i class="bi bi-file-earmark-pdf"></i>
        توليد تقرير مخصص
    </h1>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card">
            <div class="form-card-header">
                <h3>
                    <i class="bi bi-calendar-range"></i>
                    تحديد الفترة الزمنية
                </h3>
            </div>
            <div class="form-card-body">
                {% if error %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/user/custom-report">
                    <div class="date-time-group">
                        <div class="form-group">
                            <label class="form-label">تاريخ البداية</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">وقت البداية</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>
                    </div>

                    <div class="date-time-group">
                        <div class="form-group">
                            <label class="form-label">تاريخ النهاية</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">وقت النهاية</label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">اسم التقرير (اختياري)</label>
                        <input type="text" name="report_name" class="form-control" placeholder="مثال: تقرير مارس 2026">
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-generate">
                            <i class="bi bi-download"></i>
                            توليد التقرير
                        </button>
                        <button type="reset" class="btn-reset">
                            <i class="bi bi-arrow-clockwise"></i>
                            إعادة تعيين
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
